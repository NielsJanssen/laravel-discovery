      <line x1="44" y1="17.65" x2="41" y2="12.45" stroke-width="1.5"/>
    </g>
    <circle cx="118" cy="42" r="18" class="as" stroke-width="2" opacity="0.4"/>
    <circle cx="118" cy="42" r="11" class="a"/>
    <circle cx="56" cy="58" r="4" class="s" stroke-width="1.8"/>
    <circle cx="100" cy="112" r="4" class="f"/>
