name: Split

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

env:
  GITHUB_TOKEN: ${{ secrets.SPLIT_ACCESS_TOKEN }}

jobs:
  split:
    name: Split packages
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - local_path: laravel-discovery
            split_repository: laravel-discovery-core

          - local_path: laravel-discovery-graphql
            split_repository: laravel-discovery-graphql

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - if: "!startsWith(github.ref, 'refs/tags/')"
        uses: danharrin/monorepo-split-github-action@v2.4.5
        with:
          package_directory: packages/${{ matrix.package.local_path }}
          repository_organization: NielsJanssen
          repository_name: ${{ matrix.package.split_repository }}
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

      - if: "startsWith(github.ref, 'refs/tags/')"
        uses: danharrin/monorepo-split-github-action@v2.4.5
        with:
          tag: ${GITHUB_REF#refs/tags/}
          package_directory: packages/${{ matrix.package.local_path }}
          repository_organization: NielsJanssen
          repository_name: ${{ matrix.package.split_repository }}
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
